<style>
  :host {
    display: block;
    height: 100%;
  }
  #container {
    display: grid;
    max-height: 100%;
    max-width: 100%;
    grid-template-columns: 1fr;
    grid-template-rows: auto minmax(0, 1fr) auto;
    box-sizing: border-box;
    grid-gap: 2px;
    padding: 2px;
  }
  #grid {
    width: 100%;
    min-height: 0;
    aspect-ratio: 1 / 1;
    object-fit: contain; /* doesn't apply to non-replaced elements, ignore */
    max-width: 100%;
    max-height: 100%;
    justify-self: center;
    align-self: center;

    border: 2px solid #000;
    border-radius: 2px;
    padding: 2px;
    background-color: #fff;
    image-rendering: pixelated;
    box-sizing: border-box;
  }
</style>
<div id="container">
  <color-scale id="color-scale"></color-scale>
  <canvas id="grid"></canvas>
  <state-display id="state-display"></state-display>
</div>
