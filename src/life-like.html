<style>
  :host {
    display: block;
    height: 100%;
  }
  #container {
    display: grid;
    height: 100%;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 1fr auto;
    grid-template-areas:
      "canvas keys"
      "state  state";
  }
  #grid-display {
    grid-area: canvas;
    display: flex;
    flex-direction: column;
    border: 1px solid #888;
    min-width: 0;
    min-height: 0;
  }
  #color-scale {
    display: block;
  }
  #canvas-wrap {
    flex: 1;
    min-height: 0;
    container-type: size;
    display: grid;
    place-items: center;
  }
  #grid {
    aspect-ratio: 1 / 1;
    height: min(100cqh, 100cqw);
    image-rendering: pixelated;
  }
  #keybindings {
    grid-area: keys;
    background-color: #4caf50;
    border: 1px solid #888;
  }
  #state-display {
    grid-area: state;
    border: 1px solid #888;
    min-width: 0;
  }
  @media (max-width: 600px) {
    #container {
      grid-template-columns: 1fr;
      grid-template-areas:
        "canvas"
        "state";
    }
    #keybindings {
      display: none;
    }
  }
</style>
<div id="container">
  <div id="grid-display">
    <color-scale id="color-scale"></color-scale>
    <div id="canvas-wrap">
      <canvas id="grid"></canvas>
    </div>
  </div>

  <div id="keybindings"></div>

  <state-display id="state-display"></state-display>
</div>
